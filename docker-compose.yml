services:
  db:
    image: mysql:8.0
    container_name: auteco-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autecoDB
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auteco-web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: autecoDB
      DB_USER: root
      DB_PASS: root
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html

volumes:
  db_data:
